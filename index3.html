<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS Link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Bootstrap Cards</title>
</head>
<body>

    <!-- Container Start -->
    <div class="container mt-5">

        <!-- Heading -->
        <h1 class="text-center mb-4">My Bootstrap Card Layout</h1>

        <!-- Row Start -->
        <div class="row">

            <!-- Card 1 -->
            <div class="col-4">
                <div class="card">
                    

                    <div class="card-body">
                        <h5 class="card-title">Card One</h5>

                        <p class="card-text">
                            This is a simple card using Bootstrap classes.
                        </p>

                        <a href="#" class="btn btn-primary">Read More</a>
                    </div>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="col-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Card Two</h5>

                        <p class="card-text">
                            Bootstrap helps create layouts without CSS.
                        </p>

                        <a href="#" class="btn btn-success">View</a>
                    </div>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="col-4">
                <div class="card">

                    <div class="card-body">
                        <h5 class="card-title">Card Three</h5>

                        <p class="card-text">
                            Cards are useful for showing content neatly.
                        </p>

                        <a href="#" class="btn btn-danger">Click Here</a>
                    </div>
                </div>
            </div>

        </div>
        <!-- Row End -->

    </div>
    <!-- Container End -->

</body>
</html>
